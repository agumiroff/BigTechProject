parameters:
  - $ref: ../../components/parameters/order_uuid.yaml

post:
  summary: Оплата заказа
  operationId: payOrder
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ./pay_order_request.yaml
  responses:
    '200':
      description: Заказ успешно создан
      content:
        application/json:
          schema:
            $ref: ./pay_order_response.yaml
    '400':
      description: Невалидный запрос (одной из деталей не существует)
      content:
        application/json:
          schema:
            $ref: ../../components/errors/bad_request.yaml
    '404':
      description: Ордер не найден
      content:
        application/json:
          schema:
            $ref: ../../components/errors/not_found_error.yaml
    '500':
      description: Ошибка сервера
      content:
        application/json:
          schema:
            $ref: ../../components/errors/internal_error.yaml
    default:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: ../../components/errors/generic_error.yaml
