syntax = "proto3";

package payment.v1;

option go_package = "github.com/agumiroff/BigTechProject/shared/proto/payment/v1;paymentv1";

// PayOrderRequest обрабатывает команду на оплату и возвращает uuid
message PayOrderRequest {
  Payment payment = 1;
}

// Payment структура содержащая инфомрацию о платеже
message Payment {
  string order_uuid = 1;
  string user_uuid = 2;
  PaymentMethod payment_method = 4;
}

// PayOrderResponse ответ на запрос о приеме оплаты
message PayOrderResponse {
  string transaction_uuid = 1;
}

// PaymentMethod перечисление способов оплаты заказа
enum PaymentMethod {
  PAYMENT_METHOD_UNSPECIFIED = 0;  // Неизвестная категория
  PAYMENT_METHOD_CARD = 1;
  PAYMENT_METHOD_SBP = 2;
  PAYMENT_METHOD_CREDIT_CARD = 4;
  PAYMENT_METHOD_INVESTOR_MONEY = 5;
}

service PaymentService {
    rpc PayOrder(PayOrderRequest) returns (PayOrderResponse);
}